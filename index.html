<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The NL programming language specification</title>
  <link rel="icon" type="image/svg+xml" href="assets/brand/logo.svg">
  <link rel="alternate icon" href="assets/brand/logo-32.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css">
  <link rel="stylesheet" href="docsify-custom.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '<img src="assets/brand/logo.svg" alt="" class="nl-logo">NL Specs',
      repo: 'https://github.com/nlvm-lang/nlvm-specs',
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 3,
      auto2top: true,
      search: 'auto',
      basePath: /github\.io/.test(location.hostname)
        ? '/' + location.pathname.split('/')[1] + '/'
        : '/',
      darklightTheme: {
        dark: {
          accent: '#3ecfae',
          background: '#0f1413',
          textColor: '#dbe4e0',
          codeTextColor: '#dbe4e0',
          codeBackgroundColor: '#0e1514',
          borderColor: '#21302b',
          blockQuoteColor: '#90a49d',
          highlightColor: '#5fe3c4',
          sidebarSublink: '#90a49d',
          codeTypeColor: '#82b8dd'
        },
        light: {
          accent: '#1f9d82',
          background: '#ffffff',
          textColor: '#1a2422',
          codeTextColor: '#1f2d29',
          codeBackgroundColor: '#f0f4f2',
          borderColor: '#d7e2de',
          blockQuoteColor: '#5f7370',
          highlightColor: '#1f9d82',
          sidebarSublink: '#4b5e59',
          codeTypeColor: '#2f6690'
        }
      },
      plugins: [
        function (hook, vm) {
          var updateDarkClass = function () {
            document.documentElement.classList.toggle('docsify-dark', localStorage.getItem('DARK_LIGHT_THEME') === 'dark');
          };
          hook.doneEach(updateDarkClass);
          hook.mounted(function () {
            updateDarkClass();
            document.addEventListener('click', function (e) {
              if (e.target && e.target.id === 'docsify-darklight-theme') setTimeout(updateDarkClass, 50);
            });
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
</body>
</html>
